<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🍄 马里奥英语大冒险</title>
<style>
:root{--gold:#FFD700;--red:#E53935;--skin:#FFCCBC;--brown:#6D4C41;--blue:#1E88E5;--yellow:#FDD835;--white:#fff;--darkblue:#1565C0;--sky:#5c94fc;--grass:#4CAF50;--ground:#c84c09;--dark:#1a1a2e;--card:#FBF8F0;--green:#2E7D32}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:linear-gradient(135deg,#1a1a2e,#16213e);display:flex;justify-content:center;align-items:center;height:100vh;overflow:hidden;touch-action:none;-webkit-user-select:none;user-select:none}
#container{position:relative;width:960px;height:540px}
canvas{display:block;border:3px solid #333;border-radius:8px;image-rendering:pixelated}
#ui-bar{position:absolute;top:0;left:0;right:0;padding:6px 16px;display:none;justify-content:space-between;align-items:center;background:rgba(26,26,46,0.9);border-radius:8px 8px 0 0;z-index:10;color:#fff;font-size:14px;font-weight:700}
#ui-bar.show{display:flex}
.ui-i{display:flex;align-items:center;gap:4px}.ui-i .val{color:var(--gold)}
#pause-btn{position:absolute;top:8px;right:8px;z-index:11;width:36px;height:36px;border-radius:50%;border:2px solid var(--gold);background:rgba(26,26,46,0.8);color:var(--gold);font-size:16px;cursor:pointer;display:none;align-items:center;justify-content:center}
#pause-btn.show{display:flex}
/* Word modal */
#word-modal{position:absolute;top:0;left:0;right:0;bottom:0;display:flex;align-items:center;justify-content:center;z-index:20;pointer-events:none}
#word-modal.active{pointer-events:auto}
#word-modal .card{width:380px;background:var(--card);border:3px solid #C4A35A;border-radius:16px;padding:28px 24px;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,0.5);display:none}
#word-modal.active .card{display:block;animation:popIn .3s ease-out}
@keyframes popIn{from{transform:scale(0.8);opacity:0}to{transform:scale(1);opacity:1}}
.card .icon{font-size:48px;line-height:1}.card .word-title{font-size:28px;font-weight:900;color:var(--dark);margin:8px 0;letter-spacing:2px}
.card .phonetic{font-size:14px;color:#888;margin-bottom:12px}
.card .sentence{font-size:18px;color:#555;margin-bottom:24px}.card .sentence b{color:var(--red);font-size:22px}
.card .options{display:flex;flex-wrap:wrap;gap:10px;justify-content:center}
.card .opt{flex:1 1 40%;min-width:120px;padding:14px 8px;font-size:18px;font-weight:700;border:2px solid #C4A35A;border-radius:12px;background:#fff;color:var(--dark);cursor:pointer;transition:all .15s}
.card .opt:hover{background:#C4A35A;color:#fff}
.card .opt.correct{background:#4CAF50!important;color:#fff!important;border-color:#2E7D32!important}
.card .opt.wrong{background:#E53935!important;color:#fff!important;border-color:#B71C1C!important}
.card .opt:disabled{pointer-events:none}
.card .feedback{font-size:16px;margin-top:16px;min-height:24px;font-weight:700}
/* Boss modal */
#boss-modal{position:absolute;top:0;left:0;right:0;bottom:0;display:flex;align-items:center;justify-content:center;z-index:20;pointer-events:none}
#boss-modal.active{pointer-events:auto}
#boss-modal .boss-card{width:440px;background:linear-gradient(135deg,#1a1a2e,#16213e);border:3px solid #E53935;border-radius:16px;padding:28px 24px;text-align:center;box-shadow:0 8px 48px rgba(229,57,53,0.3);display:none;color:#fff}
#boss-modal.active .boss-card{display:block;animation:popIn .3s ease-out}
.boss-card .boss-icon{font-size:56px}.boss-card .boss-title{font-size:22px;font-weight:900;color:#E53935;margin:8px 0}
.boss-card .boss-sentence{font-size:20px;color:#E0D5B8;margin-bottom:20px}
.boss-card .boss-sentence b{color:var(--gold);font-size:24px}
.boss-card .boss-hint{display:flex;justify-content:center;gap:20px;margin-bottom:16px;font-size:28px}
.boss-card .boss-options{display:flex;flex-wrap:wrap;gap:10px;justify-content:center}
.boss-card .boss-opt{flex:1 1 40%;min-width:130px;padding:14px 8px;font-size:18px;font-weight:700;border:2px solid var(--gold);border-radius:12px;background:transparent;color:var(--gold);cursor:pointer;transition:all .15s}
.boss-card .boss-opt:hover{background:var(--gold);color:var(--dark)}
.boss-card .boss-opt.b-correct{background:#4CAF50!important;color:#fff!important;border-color:#2E7D32!important}
.boss-card .boss-opt.b-wrong{background:#E53935!important;color:#fff!important;border-color:#B71C1C!important}
.boss-card .boss-opt:disabled{pointer-events:none}
.boss-card .boss-fb{font-size:16px;margin-top:16px;min-height:24px;font-weight:700}
/* Pause overlay */
#pause-overlay{position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(10,10,30,0.9);display:none;align-items:center;justify-content:center;z-index:25;flex-direction:column;color:#fff;gap:20px}
#pause-overlay.show{display:flex}
#pause-overlay h2{font-size:36px;color:var(--gold)}
#pause-overlay button{padding:14px 40px;font-size:20px;font-weight:700;border:2px solid var(--gold);border-radius:12px;background:transparent;color:var(--gold);cursor:pointer;min-width:220px}
#pause-overlay button:hover{background:var(--gold);color:var(--dark)}
/* Word book */
#wordbook{position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(10,10,30,0.95);display:none;align-items:center;justify-content:center;z-index:25;flex-direction:column;color:#fff;overflow-y:auto;padding:20px}
#wordbook.show{display:flex}
#wordbook h2{font-size:28px;color:var(--gold);margin-bottom:16px}
#wordbook .wb-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;width:100%;max-width:880px}
#wordbook .wb-word{padding:10px;border:2px solid #444;border-radius:10px;text-align:center;background:rgba(255,255,255,0.05);color:#ccc;font-size:15px}
#wordbook .wb-word.learned{border-color:var(--gold);background:rgba(255,215,0,0.1);color:#fff}
#wordbook .wb-icon{font-size:24px}#wordbook .wb-en{font-weight:700;font-size:17px}#wordbook .wb-zh{font-size:13px;color:#aaa}
#wordbook .wb-back{margin-top:20px;padding:12px 36px;font-size:18px;font-weight:700;border:2px solid var(--gold);border-radius:12px;background:transparent;color:var(--gold);cursor:pointer}
/* Mobile */
#mobile-ctrl{position:absolute;bottom:8px;left:0;right:0;display:none;justify-content:space-between;padding:0 16px;z-index:15}
.ctrl{width:52px;height:52px;border-radius:50%;border:2px solid var(--gold);background:rgba(26,26,46,0.7);color:var(--gold);font-size:20px;display:flex;align-items:center;justify-content:center}
@media(max-width:980px){#container{width:100vw;height:56vw;max-height:540px}#mobile-ctrl{display:flex}}
</style>
</head>
<body>
<div id="container">
<canvas id="c"></canvas>
<div id="ui-bar"><div class="ui-i"><span>🪙</span><span class="val" id="coin-display">0</span></div><div class="ui-i"><span>📖</span><span class="val" id="level-display">L1</span></div><div class="ui-i"><span>⏱</span><span class="val" id="time-display">0:00</span></div><div class="ui-i"><span>❤️</span><span id="lives-display"></span></div></div>
<button id="pause-btn" onclick="togglePause()">⏸</button>
<div id="word-modal"><div class="card"><div class="icon" id="w-icon"></div><div class="word-title" id="w-word"></div><div class="phonetic" id="w-phonetic"></div><div class="sentence" id="w-sentence"></div><div class="options" id="w-options"></div><div class="feedback" id="w-feedback"></div></div></div>
<div id="boss-modal"><div class="boss-card"><div class="boss-icon">🐢🔥</div><div class="boss-title">⚔️ 库巴 Boss 战！</div><div class="boss-hint" id="b-hint"></div><div class="boss-sentence" id="b-sentence"></div><div class="boss-options" id="b-options"></div><div class="boss-fb" id="b-fb"></div><div style="margin-top:12px;color:#888;font-size:13px" id="boss-progress"></div></div></div>
<div id="pause-overlay"><h2>⏸ 暂停</h2><button onclick="togglePause()">▶ 继续</button><button onclick="resetLevel()">🔄 重新开始</button><button onclick="goToMenu()">🏠 返回主菜单</button></div>
<div id="wordbook"><h2>📖 单词库</h2><div class="wb-grid" id="wb-grid"></div><button class="wb-back" onclick="closeWordbook()">← 返回</button></div>
<div id="mobile-ctrl"><button class="ctrl" id="b-left">◀</button><button class="ctrl" id="b-jump">▲</button><button class="ctrl" id="b-right">▶</button></div>
</div>
<script>
// ===== CANVAS & STATE =====
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
canvas.width=960;canvas.height=540;
const W=960,H=540,GROUND=420;

let scene='menu'; // menu|worlds|levels|playing|quiz|win|dead
let curLevel=null; // {world:1,level:1}
let player,camera,coins,lives,time,frame;
let levelData,quizIdx,quizAnswered,quizCorrect,triggeredQuiz;
let keys={},particles=[],invincible=0;
let bossPhase,bossQIdx,bossCorrect,bossRetreat;
let shell=null,enemies=[],hitItems=[];
let paused=false;

// Learned words tracking
let learnedWords=JSON.parse(localStorage.getItem('marioWords')||'[]');

// ===== ALL WORD DATA =====
const ALL_WORDS = {
  '1-1':[{w:'apple',p:'/ˈæpl/',icon:'🍎',s:'I want to eat an ___.',o:['苹果','猫','蝙蝠','书包'],a:'苹果'},
         {w:'cat',p:'/kæt/',icon:'🐱',s:'The ___ is sleeping on the sofa.',o:['书包','蝙蝠','猫','苹果'],a:'猫'},
         {w:'bat',p:'/bæt/',icon:'🦇',s:'A ___ can fly at night.',o:['猫','苹果','书包','蝙蝠'],a:'蝙蝠'},
         {w:'bag',p:'/bæɡ/',icon:'🎒',s:'I put my book in the ___.',o:['蝙蝠','猫','苹果','书包'],a:'书包'}],
  '1-2':[{w:'baby',p:'/ˈbeɪbi/',icon:'👶',s:'It is a ___.',o:['婴儿','香蕉','球','男孩'],a:'婴儿'},
         {w:'banana',p:'/bəˈnɑːnə/',icon:'🍌',s:'It is a ___.',o:['球','男孩','婴儿','香蕉'],a:'香蕉'},
         {w:'ball',p:'/bɔːl/',icon:'⚽',s:'It is a ___.',o:['男孩','香蕉','婴儿','球'],a:'球'},
         {w:'boy',p:'/bɔɪ/',icon:'👦',s:'It is a ___.',o:['香蕉','球','婴儿','男孩'],a:'男孩'}],
};
// Boss questions for L2 (mix L1+L2 words)
const BOSS_QUESTIONS = [
  {s:'I want to eat an ___.',hint:'🍎 苹果 / 🐱 猫 / 🏠  / ⚽ 球',o:['apple','cat','ball','boy'],a:'apple',icons:['🍎','🐱','⚽','👦']},
  {s:'It is a ___.',hint:'🍌 / 🦇 / 🐱 / 👶',o:['banana','bat','cat','baby'],a:'banana',icons:['🍌','🦇','🐱','👶']},
  {s:'The ___ is sleeping on the sofa.',hint:'🐱 猫 / 🎒 包 / 👦 男孩 / 🍎 苹果',o:['cat','bag','boy','apple'],a:'cat',icons:['🐱','🎒','👦','🍎']},
];

// Level config
const LEVELS = {};
ALL_WORDS['1-1'].forEach((wd,i)=>{
  LEVELS['1-1']={words:ALL_WORDS['1-1'],quizzes:[{x:[400,1000,1600,2200][i]}],hasBoss:false,worldName:'🌿 草地王国'};
});
ALL_WORDS['1-2'].forEach((wd,i)=>{
  LEVELS['1-2']={words:ALL_WORDS['1-2'],quizzes:[{x:[550,1150,1650,2200][i]}],hasBoss:true,worldName:'🌿 草地王国'};
});

// ===== PRONUNCIATION =====
const synth=window.speechSynthesis;let soundOn=true;
function speak(text,rate=0.7){
  if(!soundOn||!synth)return;synth.cancel();
  const u=new SpeechSynthesisUtterance(text);u.lang='en-US';u.rate=rate;u.pitch=1.1;synth.speak(u);
}

// ===== DRAWING FUNCTIONS =====
function drawPixelChar(x,y,facing,big){
  const s=big?1.5:1,ox=x,oy=y;ctx.save();
  if(facing===-1){ctx.translate(ox+16*s,0);ctx.scale(-1,1);x=-ox-16*s;}
  ctx.fillStyle='#E53935';ctx.fillRect(x+6*s,oy+18*s,10*s,20*s);ctx.fillRect(x+2*s,oy+16*s,14*s,4*s);
  ctx.fillStyle='#FFCCBC';ctx.fillRect(x+6*s,oy+4*s,12*s,14*s);
  ctx.fillStyle='#E53935';ctx.fillRect(x+4*s,oy-2*s,16*s,8*s);
  ctx.fillStyle='#fff';ctx.fillRect(x+8*s,oy+8*s,4*s,4*s);ctx.fillRect(x+14*s,oy+8*s,4*s,4*s);
  ctx.fillStyle='#000';ctx.fillRect(x+10*s,oy+10*s,2*s,2*s);ctx.fillRect(x+16*s,oy+10*s,2*s,2*s);
  ctx.fillStyle='#1E88E5';ctx.fillRect(x+6*s,oy+20*s,5*s,16*s);ctx.fillRect(x+13*s,oy+20*s,5*s,16*s);
  ctx.fillStyle='#FDD835';ctx.fillRect(x+8*s,oy+26*s,3*s,3*s);ctx.fillRect(x+15*s,oy+26*s,3*s,3*s);
  ctx.fillStyle='#6D4C41';ctx.fillRect(x+4*s,oy+38*s,10*s,8*s);ctx.fillRect(x+14*s,oy+38*s,10*s,8*s);
  if(!player||!player.onGround){ctx.fillStyle='#6D4C41';ctx.fillRect(x+6*s,oy+42*s,8*s,5*s);ctx.fillRect(x+14*s,oy+42*s,8*s,5*s);}
  ctx.restore();
}
function drawGoomba(e){
  ctx.fillStyle='#8B4513';ctx.fillRect(e.x,e.y,28,28);ctx.fillStyle='#A0522D';ctx.fillRect(e.x+3,e.y+3,22,22);
  ctx.fillStyle='#fff';ctx.fillRect(e.x+5,e.y+6,6,6);ctx.fillRect(e.x+17,e.y+6,6,6);
  ctx.fillStyle='#000';ctx.fillRect(e.x+8,e.y+9,3,3);ctx.fillRect(e.x+20,e.y+9,3,3);
  const ft=Math.sin(frame*0.15)*2;ctx.fillStyle='#000';ctx.fillRect(e.x+2,e.y+24+ft,6,4);ctx.fillRect(e.x+20,e.y+24-ft,6,4);
}
function drawKoopa(e){
  ctx.fillStyle='#4CAF50';ctx.fillRect(e.x+2,e.y+2,24,24);ctx.fillStyle='#2E7D32';ctx.fillRect(e.x+6,e.y+6,16,12);
  ctx.fillStyle='#FFD700';ctx.fillRect(e.x+2,e.y,24,8);ctx.fillStyle='#fff';ctx.fillRect(e.x+7,e.y+10,5,5);ctx.fillRect(e.x+16,e.y+10,5,5);
  ctx.fillStyle='#000';ctx.fillRect(e.x+9,e.y+12,2,2);ctx.fillRect(e.x+18,e.y+12,2,2);
  ctx.fillStyle='#FFA000';ctx.fillRect(e.x+2,e.y+22,6,6);ctx.fillRect(e.x+20,e.y+22,6,6);
}
function drawShell(s){ctx.fillStyle='#2E7D32';ctx.fillRect(s.x,s.y,28,16);ctx.fillStyle='#4CAF50';ctx.fillRect(s.x+4,s.y+2,20,12);ctx.fillStyle='#FFD700';ctx.fillRect(s.x+6,s.y-2,16,6);}
function drawBrick(x,y,item){
  ctx.fillStyle='#8B6914';ctx.fillRect(x,y,64,32);ctx.fillStyle='#A0782C';
  for(let bx=0;bx<64;bx+=16)for(let by=0;by<32;by+=8)ctx.fillRect(x+bx+2,y+by+2,12,4);
  ctx.fillStyle='#C4A35A';ctx.fillRect(x,y,64,3);
  if(item&&!hitItems.find(h=>h.x===x+20&&h.hit)){ctx.fillStyle='#FFD700';ctx.font='bold 14px serif';ctx.textAlign='center';ctx.fillText('?',x+32,y+22);}
}
function drawPipe(x,y){ctx.fillStyle='#4CAF50';ctx.fillRect(x,y,64,60);ctx.fillStyle='#2E7D32';ctx.fillRect(x,y,64,16);ctx.fillStyle='#1B5E20';ctx.fillRect(x-4,y,8,60);ctx.fillRect(x+60,y,8,60);}
function drawBoss(bx,by){
  ctx.fillStyle='#4CAF50';ctx.beginPath();ctx.ellipse(bx+50,by+40,45,30,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#FFD700';ctx.fillRect(bx+10,by-10,80,50);ctx.fillStyle='#2E7D32';ctx.fillRect(bx+15,by-5,70,35);
  ctx.fillStyle='#fff';ctx.fillRect(bx+25,by-2,15,18);ctx.fillRect(bx+60,by-2,15,18);
  ctx.fillStyle='#E53935';ctx.fillRect(bx+29,by+4,8,8);ctx.fillRect(bx+64,by+4,8,8);
  ctx.fillStyle='#8B4513';ctx.beginPath();ctx.moveTo(bx+15,by-12);ctx.lineTo(bx+30,by-35);ctx.lineTo(bx+40,by-12);ctx.fill();
  ctx.beginPath();ctx.moveTo(bx+60,by-12);ctx.lineTo(bx+75,by-35);ctx.lineTo(bx+85,by-12);ctx.fill();
  ctx.fillStyle='#FFA000';ctx.fillRect(bx+10,by+60,25,18);ctx.fillRect(bx+65,by+60,25,18);
  ctx.fillStyle='#E53935';ctx.beginPath();ctx.ellipse(bx+50,by+80,30,20,0,0,Math.PI*2);ctx.fill();
}
function drawBg(){
  const g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,'#87CEEB');g.addColorStop(0.6,'#5c94fc');g.addColorStop(1,'#4a7de0');
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  ctx.fillStyle='rgba(255,255,255,0.7)';for(let i=0;i<5;i++){const cx=((i*350)-camera*0.3)%(W+400)-200;ctx.fillRect(cx,60+i*40,80,30);ctx.fillRect(cx+15,48+i*40,50,20);}
  ctx.fillStyle='#7CBF5C';for(let i=0;i<4;i++){const hx=i*800-300-camera*0.2;ctx.beginPath();ctx.moveTo(hx,GROUND);ctx.quadraticCurveTo(hx+200,GROUND-100,hx+400,GROUND);ctx.fill();}
}

function spawnParticles(x,y,color,n){for(let i=0;i<n;i++)particles.push({x,y,vx:(Math.random()-0.5)*5,vy:(Math.random()-0.5)*5-3,life:20+Math.random()*15,color});}

// ===== PHYSICS =====
const GRAVITY=0.55,SPEED=3.5,JUMP=-10.5;
function collides(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y;}

function updatePhysics(){
  if(paused||scene!=='playing')return;
  if(keys['ArrowLeft']||keys['a']){player.vx=-SPEED;player.facing=-1;}
  else if(keys['ArrowRight']||keys['d']){player.vx=SPEED;player.facing=1;}
  else player.vx*=0.7;
  if(Math.abs(player.vx)<0.1)player.vx=0;
  if((keys[' ']||keys['ArrowUp']||keys['w'])&&player.onGround){player.vy=JUMP;player.onGround=false;}
  player.vy+=GRAVITY;player.x+=player.vx;player.y+=player.vy;

  player.onGround=false;
  const pb=player.big?{x:player.x,y:player.y,w:48,h:72}:{x:player.x,y:player.y,w:player.w,h:player.h};
  levelData.platforms.forEach(p=>{
    let px=p.x,py=p.y;if(p.type==='move'){px=p.x;py=p.y;}
    if(!collides(pb,{x:px,y:py,w:p.w,h:p.h}))return;
    const ot=pb.y+pb.h-py,ob=py+p.h-pb.y,ol=pb.x+pb.w-px,orr=px+p.w-pb.x;
    const mo=Math.min(ot,ob,ol,orr);
    if(mo===ot&&player.vy>=0){player.y=py-(player.big?72:48);player.vy=0;player.onGround=true;if(p.type==='move')player.x+=p.moveSpeed||0;}
    else if(mo===ol&&player.vx>0)player.x=px-(player.big?48:32);
    else if(mo===orr&&player.vx<0)player.x=px+p.w;
  });
  if(player.y+(player.big?72:48)>=GROUND){player.y=GROUND-(player.big?72:48);player.vy=0;player.onGround=true;}
  if(player.y>GROUND+200)die();

  // Moving platforms
  (levelData.movePlatforms||[]).forEach(p=>{p.x+=p.moveSpeed;if(Math.abs(p.x-p.startX)>p.range)p.moveSpeed*=-1;});

  camera+=(player.x-camera-W*0.35)*0.08;if(camera<0)camera=0;if(camera>levelData.w-W)camera=levelData.w-W;

  // Boss trigger
  if(levelData.hasBoss&&!bossPhase&&player.x>levelData.w-300)activateBoss();

  // Enemies
  enemies.forEach(e=>{
    if(e.y>GROUND+50)return;if(e.type==='shell')return;
    e.x+=e.vx;if(Math.abs(e.x-e.sx)>e.range)e.vx*=-1;
    const el={x:e.x+2,y:e.y+2,w:e.w-4,h:e.h-4};
    if(!collides(pb,el))return;
    if(player.vy>0&&pb.y+pb.h-el.y<18){
      if(e.type==='koopa'){e.type='shell';e.h=16;e.y+=12;e.vx=0;spawnParticles(e.x+14,e.y,'#FFD700',8);coins+=3;}
      else{e.y=GROUND+100;coins+=3;spawnParticles(e.x+14,e.y+14,'#FFD700',10);}
      player.vy=-5;
    }else if(invincible>0){e.y=GROUND+100;coins+=5;}
    else die();
  });

  // Shell
  if(shell&&shell.active){shell.x+=shell.vx;enemies.forEach(e=>{if(e.y<GROUND+50&&collides(shell,{x:e.x+2,y:e.y+2,w:e.w-4,h:e.h-4})){e.y=GROUND+100;coins+=5;spawnParticles(e.x+14,e.y+14,'#FFD700',8);}});if(shell.vx!==0&&Math.abs(shell.x-shell.startX)>600){shell.active=false;shell=null;}}
  if(shell&&shell.vx===0&&collides(pb,shell)){shell.vx=(player.x>shell.x)?8:-8;shell.active=true;}

  // Coins
  levelData.coins.forEach(c=>{if(!c.collected&&Math.abs(player.x+16-c.x)<18&&Math.abs(player.y+24-c.y)<20){c.collected=true;coins++;spawnParticles(c.x,c.y,'#FFD700',4);}});

  // Hit items
  hitItems.forEach(h=>{if(!h.hit&&!h.active&&Math.abs(player.x+16-h.x)<20&&Math.abs(player.y-h.y)<20&&player.vy<0){h.active=true;h.hit=true;if(h.item==='coin')coins+=3;else if(h.item==='mushroom'&&!player.big){player.big=true;player.y-=24;}else if(h.item==='star')invincible=300;spawnParticles(h.x,h.y-10,'#FFD700',8);}});

  // Quiz triggers
  levelData.quizzes.forEach((q,i)=>{if(!triggeredQuiz.includes(i)&&Math.abs(player.x-q.x)<40){triggeredQuiz.push(i);quizIdx=i;if(levelData.hasBoss&&i>=levelData.quizzes.length-1)activateBoss();else showWordCard();}});

  if(invincible>0)invincible--;
  if(bossRetreat>0)bossRetreat--;
  particles=particles.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.15;p.life--;return p.life>0;});
}

function die(){
  if(scene==='dead')return;lives--;spawnParticles(player.x+16,player.y+24,'#E53935',15);
  if(lives<=0){scene='dead';updateUI();return;}
  player.x=Math.max(80,camera+50);player.y=GROUND-48;player.vx=0;player.vy=0;player.big=false;invincible=120;updateUI();
}

function activateBoss(){if(bossPhase)return;bossPhase=true;bossQIdx=0;bossCorrect=0;showBossQuestion();}

// ===== WORD CARD =====
function showWordCard(){
  scene='quiz';const wd=ALL_WORDS[curLevel.world+'-'+curLevel.level][quizIdx];
  document.getElementById('w-icon').textContent=wd.icon;
  document.getElementById('w-word').textContent=wd.w;document.getElementById('w-phonetic').textContent=wd.p;
  document.getElementById('w-sentence').innerHTML=wd.s.replace('___','<b>___</b>');
  document.getElementById('w-feedback').textContent='';
  const optEl=document.getElementById('w-options');optEl.innerHTML='';
  wd.o.forEach(o=>{const b=document.createElement('button');b.className='opt';b.textContent=o;b.onclick=()=>answerWord(o,b);optEl.appendChild(b);});
  document.getElementById('word-modal').classList.add('active');
  speak(wd.w,0.7);
}
function answerWord(choice,btn){
  const wd=ALL_WORDS[curLevel.world+'-'+curLevel.level][quizIdx];
  const opts=document.querySelectorAll('#w-options .opt');opts.forEach(o=>o.disabled=true);
  if(choice===wd.a){btn.classList.add('correct');document.getElementById('w-feedback').textContent='✅ 答对了！';document.getElementById('w-feedback').style.color='#4CAF50';quizCorrect++;coins+=5;speak(wd.w+'! Great!',0.8);}
  else{btn.classList.add('wrong');document.getElementById('w-feedback').textContent='❌ 正确答案：'+wd.a;document.getElementById('w-feedback').style.color='#E53935';opts.forEach(o=>{if(o.textContent===wd.a)o.classList.add('correct');});speak(wd.a,0.7);}
  quizAnswered++;
  markLearned(curLevel.world+'-'+curLevel.level,quizIdx);
  setTimeout(()=>{document.getElementById('word-modal').classList.remove('active');
    if(quizAnswered>=ALL_WORDS[curLevel.world+'-'+curLevel.level].length){
      if(levelData.hasBoss&&!bossPhase)activateBoss();
      else{scene='win';saveProgress();}
    }else scene='playing';
  },1200);
}

// ===== BOSS CARD =====
function showBossQuestion(){
  scene='quiz';const q=BOSS_QUESTIONS[bossQIdx%BOSS_QUESTIONS.length];
  document.getElementById('b-hint').textContent=q.hint;
  document.getElementById('b-sentence').innerHTML=q.s.replace('___','<b>___</b>');
  document.getElementById('b-fb').textContent='';
  document.getElementById('boss-progress').textContent='连续答对 3 题击败库巴！('+(bossCorrect)+'/3)';
  const oel=document.getElementById('b-options');oel.innerHTML='';
  q.o.forEach((o,i)=>{const b=document.createElement('button');b.className='boss-opt';b.textContent=q.icons?q.icons[i]+' '+o:o;b.onclick=()=>answerBoss(o,b);oel.appendChild(b);});
  document.getElementById('boss-modal').classList.add('active');
  speak(q.s.replace('___',q.a),0.7);
}
function answerBoss(choice,btn){
  const q=BOSS_QUESTIONS[bossQIdx%BOSS_QUESTIONS.length];
  const opts=document.querySelectorAll('#boss-modal .boss-opt');opts.forEach(o=>o.disabled=true);
  if(choice===q.a){btn.classList.add('b-correct');document.getElementById('b-fb').textContent='✅ 答对了！库巴后退！';document.getElementById('b-fb').style.color='#4CAF50';bossCorrect++;bossRetreat=40;coins+=5;speak(q.a+'! Yes!',0.8);}
  else{btn.classList.add('b-wrong');document.getElementById('b-fb').textContent='❌ 正确答案：'+q.a;document.getElementById('b-fb').style.color='#E53935';opts.forEach(o=>{if(o.textContent.includes(q.a))o.classList.add('b-correct');});speak(q.a,0.7);}
  bossQIdx++;
  setTimeout(()=>{document.getElementById('boss-modal').classList.remove('active');
    if(bossCorrect>=3){scene='win';saveProgress();}
    else if(bossQIdx>=BOSS_QUESTIONS.length){bossQIdx=0;showBossQuestion();}
    else showBossQuestion();
  },1200);
}

        const btnW=260,btnH=44,bx=W/2-btnW/2,by=b.y;
        const hover=mx>bx&&mx<bx+btnW&&my>by&&my<by+btnH;
        ctx.fillStyle=hover?'#FFD700':'rgba(255,215,0,0.2)';ctx.fillRect(bx,by,btnW,btnH);
        ctx.strokeStyle='#FFD700';ctx.lineWidth=2;ctx.strokeRect(bx,by,btnW,btnH);
        ctx.fillStyle=hover?'#1a1a2e':'#FFD700';ctx.font='bold 18px "PingFang SC","Microsoft YaHei",sans-serif';
        ctx.fillText(b.t,W/2,by+30);
      });
    }
  }
}

let menuBtns=[],worldBtns=[],levelBtns=[],winBtns=[],menuBack=false,selWorld=1,mx=0,my=0;

canvas.addEventListener('click',e=>{
  const rect=canvas.getBoundingClientRect();
  mx=(e.clientX-rect.left)*(W/rect.width);my=(e.clientY-rect.top)*(H/rect.height);
  if(scene==='menu'){
    menuBtns.forEach(b=>{const bx=W/2-140;if(mx>bx&&mx<bx+280&&my>b.y&&my<b.y+48)b.action();});
  }else if(scene==='worlds'){
    if(menuBack&&my>510&&my<540)scene='menu';
    worldBtns.forEach(b=>{if(mx>b.bx&&mx<b.bx+b.btnW&&my>b.by&&my<b.by+b.btnH){selWorld=b.w;scene='levels';}});
  }else if(scene==='levels'){
    if(menuBack&&my>510&&my<540)scene='worlds';
    levelBtns.forEach(b=>{if(mx>b.bx&&mx<b.bx+b.btnW&&my>b.by&&my<b.by+b.btnH)initLevel(1,b.l);});
  }else if(scene==='win'){
    winBtns.forEach((b,i)=>{const bx=W/2-130;if(mx>bx&&mx<bx+260&&my>b.y&&my<b.y+44){
      if(i===0)resetLevel();
      else if(i===1){if(curLevel.level<2)initLevel(curLevel.world,curLevel.level+1);else goToMenu();}
      else goToMenu();
    }});
  }else if(scene==='dead'){
    resetLevel();
  }
});

// ===== WORD BOOK =====
function showWordbook(){
  document.getElementById('wordbook').classList.add('show');
  const grid=document.getElementById('wb-grid');grid.innerHTML='';
  const allFlat=[];
  Object.entries(ALL_WORDS).forEach(([k,words])=>{
    words.forEach(wd=>{allFlat.push({key:k+':'+wd.w,...wd,learned:learnedWords.includes(k+':'+wd.w)});});
  });
  allFlat.forEach(wd=>{
    const d=document.createElement('div');d.className='wb-word'+(wd.learned?' learned':'');
    d.innerHTML='<div class="wb-icon">'+wd.icon+'</div><div class="wb-en">'+wd.w+'</div><div class="wb-zh">'+wd.a+(wd.learned?' ✅':'')+'</div>';
    d.onclick=()=>speak(wd.w,0.7);
    grid.appendChild(d);
  });
}
function closeWordbook(){document.getElementById('wordbook').classList.remove('show');}

// ===== MOBILE INPUT =====
window.addEventListener('keydown',e=>{keys[e.key]=true;if(scene==='playing'||scene==='dead'||scene==='win')e.preventDefault();});
window.addEventListener('keyup',e=>{keys[e.key]=false;});
['b-left','b-right','b-jump'].forEach(id=>{
  const btn=document.getElementById(id);
  btn.addEventListener('pointerdown',()=>{const k=id==='b-left'?'ArrowLeft':id==='b-right'?'ArrowRight':' ';keys[k]=true;if(k===' ')keys['ArrowUp']=true;});
  btn.addEventListener('pointerup',()=>{const k=id==='b-left'?'ArrowLeft':id==='b-right'?'ArrowRight':' ';keys[k]=false;keys['ArrowUp']=false;});
});

// ===== UI =====
function updateUI(){
  if(scene!=='playing'&&scene!=='quiz'){
    document.getElementById('ui-bar').classList.remove('show');
    document.getElementById('pause-btn').classList.remove('show');
    return;
  }
  document.getElementById('ui-bar').classList.add('show');
  document.getElementById('pause-btn').classList.add('show');
  document.getElementById('coin-display').textContent=coins;
  document.getElementById('level-display').textContent='L'+curLevel.level+' · '+(curLevel.world===1&&curLevel.level===1?'Aa':'Bb');
  const t=Math.floor(time);document.getElementById('time-display').textContent=Math.floor(t/60)+':'+String(t%60).padStart(2,'0');
  document.getElementById('lives-display').innerHTML=Array(Math.max(1,lives)).fill('<span style="color:#E53935;margin:0 1px">❤️</span>').join('');
}

// ===== LOOP =====
function loop(){
  if(scene==='playing'&&!paused){time=frame/60;updatePhysics();}
  if(scene==='dead'&&(keys[' ']||keys['Enter']))resetLevel();
  updateUI();render();frame++;requestAnimationFrame(loop);
}
loop();

function resize(){const ctr=document.getElementById('container');if(window.innerWidth<980){canvas.style.width=ctr.clientWidth+'px';canvas.style.height=(ctr.clientWidth*0.5625)+'px';}else{canvas.style.width='960px';canvas.style.height='540px';}}
window.addEventListener('resize',resize);resize();
</script>
